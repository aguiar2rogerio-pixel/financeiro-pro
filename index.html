<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta name="theme-color" content="#121212">

    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #4caf50;
            --text-color: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #333;
            --danger-color: #cf6679;
            --accent-color: #03dac6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 16px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
        }

        .input-group {
            position: relative;
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #2c2c2c;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn-add {
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            width: 48px;
            height: 48px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 56px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 20;
            display: none;
        }

        .suggestion-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 120px;
        }

        section {
            margin-bottom: 24px;
        }

        h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .list-item {
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: opacity 0.3s;
        }

        .list-item.checked {
            opacity: 1;
            border: 1px solid rgba(129, 199, 132, 0.3);
        }

        .list-item.checked .item-name {
            text-decoration: line-through;
            color: #81c784;
            font-size: 1.1rem;
        }

        .list-item.checked .item-details {
            color: #a5d6a7;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--primary-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .checkbox.checked::after {
            content: '✓';
            color: var(--primary-color);
            font-weight: bold;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 500;
            display: block;
        }

        .item-details {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 4px;
            cursor: pointer;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .totals {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .total-item span {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .total-item b {
            font-size: 1.1rem;
            color: var(--primary-color);
        }

        .btn-finish {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }

        /* Modal / Quick Edit */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal {
            background-color: var(--surface-color);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }

        .modal-title {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .form-row {
            margin-bottom: 16px;
        }

        .form-row label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .modal input, .modal select {
            background-color: #2c2c2c;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-color);
            font-size: 16px;
            width: 100%;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-cancel {
            flex: 1;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
        }

        .btn-save {
            flex: 2;
            background-color: var(--primary-color);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .history-list {
            margin-top: 12px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .monthly-summary {
            background-color: #2c2c2c;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>Lista de Compras</h1>
    <div class="input-group">
        <input type="text" id="itemInput" placeholder="Adicionar item (ex: Leite)" autocomplete="off">
        <button class="btn-add" id="btnAdd">+</button>
        <div class="suggestions" id="suggestions"></div>
    </div>
</header>

<main>
    <section id="section-todo">
        <h2 style="display: flex; justify-content: space-between;">
            <span>Para Comprar</span>
            <span id="count-todo" style="font-size: 0.75rem; background: #333; padding: 2px 8px; border-radius: 10px;">0 itens</span>
        </h2>
        <div id="list-todo"></div>
    </section>

    <section id="section-cart">
        <h2 style="display: flex; justify-content: space-between;">
            <span>No Carrinho</span>
            <span id="count-cart" style="font-size: 0.75rem; background: var(--primary-color); color: white; padding: 2px 8px; border-radius: 10px;">0 itens</span>
        </h2>
        <div id="list-cart"></div>
    </section>

    <section id="section-history">
        <h2>Histórico</h2>
        <div id="history-container"></div>
        <div class="backup-controls" style="display: flex; gap: 8px; margin-top: 16px;">
            <button class="btn-cancel" id="btnBackup" style="font-size: 0.8rem; padding: 8px;">💾 Criar Backup</button>
            <button class="btn-cancel" id="btnRestore" style="font-size: 0.8rem; padding: 8px;">🔄 Restaurar</button>
        </div>
        <div class="monthly-summary" id="monthly-summary">
            <div style="display: flex; justify-content: space-between;">
                <span>Total do Mês:</span>
                <b id="total-month">R$ 0,00</b>
            </div>
            <div id="prev-month-container" class="hidden" style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.85rem; color: var(--text-secondary);">
                <span>Mês Anterior:</span>
                <span id="total-prev-month">R$ 0,00</span>
            </div>
        </div>

    </section>
</main>

<footer>
    <div class="totals">
        <div class="total-item">
            <span>Estimado</span>
            <b id="val-estimated">R$ 0,00</b>
        </div>
        <div class="total-item" style="text-align: right;">
            <span>No Carrinho</span>
            <b id="val-real">R$ 0,00</b>
        </div>
    </div>
    <button class="btn-finish" id="btnFinish">Finalizar Compra</button>
    <button id="btnResetApp" style="background: none; border: 1px solid var(--danger-color); color: var(--danger-color); border-radius: 8px; padding: 8px; font-size: 0.75rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; opacity: 0.8;">ZERAR APLICATIVO (RESET TOTAL)</button>
</footer>

<div class="modal-overlay" id="modalEdit">
    <div class="modal">
        <h3 class="modal-title" id="editTitle">Editar Item</h3>
        <div class="form-row">
            <label>Tipo</label>
            <select id="editType">
                <option value="un">Unidade (un)</option>
                <option value="kg">Peso (kg)</option>
            </select>
        </div>
        <div class="form-row">
            <label id="labelQty">Quantidade / Peso</label>
            <input type="text" id="editQty" placeholder="Ex: 2 ou 0.500">
        </div>
        <div class="form-row">
            <label>Preço (R$)</label>
            <input type="number" id="editPrice" step="0.01" placeholder="0,00">
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" id="btnCancelEdit">Cancelar</button>
            <button class="btn-save" id="btnSaveEdit">Salvar</button>
        </div>
    </div>
</div>

<script>
    let state = {
        items: [], 
        history: [], 
        itemBank: {}, 
        monthlyTotal: 0,
        prevMonthTotal: 0,
        currentMonth: new Date().getMonth()
    };

    const STORAGE_KEY = 'smart_shopping_list_v1';

    async function init() {
        if (navigator.storage && navigator.storage.persist) {
            const isPersisted = await navigator.storage.persist();
            console.log(`Persistência de storage: ${isPersisted}`);
        }

        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                state = JSON.parse(saved);
            } catch (e) {
                console.error("Erro ao carregar dados:", e);
            }
        }
        render();
        setupEventListeners();
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function addItem(name) {
        if (!name.trim()) return;
        
        const lastPrice = state.itemBank[name.toLowerCase()] || 0;
        const newItem = {
            id: Date.now(),
            name: name.trim(),
            qty: 1,
            type: 'un',
            price: lastPrice,
            checked: false,
            lastPrice: lastPrice
        };
        
        state.items.push(newItem);
        save();
        render();
    }

    function parseWeight(val) {
        let num = parseFloat(val.toString().replace(',', '.'));
        if (isNaN(num)) return 0;
        if (val.toString().toLowerCase().includes('g') || (num >= 5 && !val.toString().includes('.'))) {
            return num / 1000;
        }
        return num;
    }

    function updateItem(id, updates) {
        const idx = state.items.findIndex(i => i.id === id);
        if (idx !== -1) {
            if (updates.qty !== undefined && state.items[idx].type === 'kg') {
                updates.qty = parseWeight(updates.qty);
            }
            state.items[idx] = { ...state.items[idx], ...updates };
            
            if (updates.price !== undefined) {
                state.itemBank[state.items[idx].name.toLowerCase()] = updates.price;
            }
            
            save();
            render();
        }
    }

    function toggleItem(id) {
        const item = state.items.find(i => i.id === id);
        if (item) {
            item.checked = !item.checked;
            if (item.checked) {
                openEditModal(id); 
            }
            save();
            render();
        }
    }

    function deleteItem(id) {
        state.items = state.items.filter(i => i.id !== id);
        save();
        render();
    }

    function finishPurchase() {
        const realTotal = calculateRealTotal();
        if (realTotal > 0 || state.items.some(i => i.checked)) {
            const date = new Date().toLocaleDateString('pt-BR');
            state.history.unshift({ date, total: realTotal });
            state.monthlyTotal += realTotal;
            
            state.items = state.items.filter(i => !i.checked).map(i => ({
                ...i,
                price: state.itemBank[i.name.toLowerCase()] || 0
            }));
            
            save();
            render();
            alert('Compra finalizada com sucesso!');
        }
    }

    function calculateEstimatedTotal() {
        return state.items
            .filter(i => !i.checked)
            .reduce((acc, i) => {
                const priceToUse = i.price > 0 ? i.price : (i.lastPrice || 0);
                return acc + (i.qty * priceToUse);
            }, 0);
    }

    function calculateRealTotal() {
        return state.items
            .filter(i => i.checked)
            .reduce((acc, i) => acc + (i.qty * (i.price || 0)), 0);
    }

    function render() {
        const listTodo = document.getElementById('list-todo');
        const listCart = document.getElementById('list-cart');
        const historyContainer = document.getElementById('history-container');
        
        listTodo.innerHTML = '';
        listCart.innerHTML = '';
        
        let todoCount = 0;
        let cartCount = 0;

        state.items.forEach(item => {
            if (item.checked) {
                cartCount++;
                const el = createItemElement(item, cartCount);
                listCart.appendChild(el);
            } else {
                todoCount++;
                const el = createItemElement(item, todoCount);
                listTodo.appendChild(el);
            }
        });

        document.getElementById('count-todo').innerText = `${todoCount} ${todoCount === 1 ? 'item' : 'itens'}`;
        document.getElementById('count-cart').innerText = `${cartCount} ${cartCount === 1 ? 'item' : 'itens'}`;

        document.getElementById('val-estimated').innerText = `R$ ${calculateEstimatedTotal().toFixed(2).replace('.', ',')}`;
        document.getElementById('val-real').innerText = `R$ ${calculateRealTotal().toFixed(2).replace('.', ',')}`;
        document.getElementById('total-month').innerText = `R$ ${state.monthlyTotal.toFixed(2).replace('.', ',')}`;
        
        if (state.prevMonthTotal > 0) {
            document.getElementById('prev-month-container').classList.remove('hidden');
            document.getElementById('total-prev-month').innerText = `R$ ${state.prevMonthTotal.toFixed(2).replace('.', ',')}`;
        }

        historyContainer.innerHTML = '';
        state.history.slice(0, 5).forEach(h => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${h.date}</span><b>R$ ${h.total.toFixed(2).replace('.', ',')}</b>`;
            historyContainer.appendChild(div);
        });
    }

    function createItemElement(item, index) {
        const div = document.createElement('div');
        div.className = `list-item ${item.checked ? 'checked' : ''}`;
        
        const subtext = item.type === 'un' 
            ? `${item.qty} un x R$ ${item.price.toFixed(2)}`
            : `${item.qty.toFixed(3)} kg x R$ ${item.price.toFixed(2)}`;

        div.innerHTML = `
            <div class="checkbox ${item.checked ? 'checked' : ''}" onclick="toggleItem(${item.id})"></div>
            <div class="item-info" onclick="openEditModal(${item.id})">
                <span class="item-name">${index}. ${item.name}</span>
                <span class="item-details">${subtext} = R$ ${(item.qty * item.price).toFixed(2)}</span>
            </div>
            <div class="item-actions">
                <button class="btn-icon" onclick="deleteItem(${item.id})">✕</button>
            </div>
        `;
        return div;
    }

    let editingId = null;

    function openEditModal(id) {
        editingId = id;
        const item = state.items.find(i => i.id === id);
        if (!item) return;

        document.getElementById('editTitle').innerText = item.name;
        document.getElementById('editType').value = item.type;
        document.getElementById('editQty').value = item.type === 'kg' ? item.qty.toFixed(3) : item.qty;
        document.getElementById('editPrice').value = item.price || '';
        
        document.getElementById('modalEdit').style.display = 'flex';
    }

    function setupEventListeners() {
        const input = document.getElementById('itemInput');
        const btnAdd = document.getElementById('btnAdd');
