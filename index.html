    <style>
        body {
            background-color: #111111;
            color: #e5e7eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

<body class="p-4 max-w-md mx-auto pb-20">

    <header class="text-center mb-6 pt-4">
        <h1 class="text-gray-400 text-xs uppercase tracking-widest mb-1">Saldo Acumulado Total</h1>
        <div id="saldo-total" class="text-5xl font-bold text-green-500">R$ 0,00</div>
    </header>

    <div id="ultimo-resumo-container" class="hidden mb-6 animate-fade-in">
        <div class="card-glass rounded-2xl p-4 border border-blue-900/30">
            <h3 class="text-blue-400 text-[10px] uppercase font-bold mb-2 tracking-wider">Último Lançamento Detalhado</h3>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-gray-800/50 p-2 rounded-lg">
                    <span class="block text-[9px] text-gray-500 uppercase">Ganho</span>
                    <span id="last-ganho" class="text-sm font-bold text-green-400">R$ 0</span>
                </div>
                <div class="bg-gray-800/50 p-2 rounded-lg">
                    <span class="block text-[9px] text-gray-500 uppercase">Gastos</span>
                    <span id="last-gastos" class="text-sm font-bold text-red-400">R$ 0</span>
                </div>
                <div class="bg-gray-800/50 p-2 rounded-lg">
                    <span class="block text-[9px] text-gray-500 uppercase">Reserva</span>
                    <span id="last-reserva" class="text-sm font-bold text-orange-400">R$ 0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="space-y-4 bg-gray-900 p-6 rounded-3xl shadow-2xl border border-gray-800">
        <div>
            <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">FATURAMENTO DO DIA (R$)</label>
            <input type="number" id="faturamento" inputmode="decimal" placeholder="0,00" class="w-full bg-gray-800 text-white text-3xl p-5 rounded-2xl border border-gray-700 focus:ring-4 focus:ring-blue-500/20 transition-all">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1 ml-1 uppercase">Gasolina</label>
                <input type="number" id="gasolina" inputmode="decimal" placeholder="0,00" class="w-full bg-gray-800 text-white text-xl p-4 rounded-2xl border border-gray-700">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1 ml-1 uppercase">Pessoal</label>
                <input type="number" id="pessoal" inputmode="decimal" placeholder="0,00" class="w-full bg-gray-800 text-white text-xl p-4 rounded-2xl border border-gray-700">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1 ml-1 uppercase">Manutenção</label>
                <input type="number" id="manutencao" inputmode="decimal" value="15.00" class="w-full bg-gray-800 text-white text-xl p-4 rounded-2xl border border-gray-700">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1 ml-1 uppercase">Reserva Caixa</label>
                <input type="number" id="reserva" inputmode="decimal" placeholder="0,00" class="w-full bg-gray-800 text-white text-xl p-4 rounded-2xl border border-gray-700">
            </div>
        </div>

        <button onclick="salvarLancamento(event)" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-2xl text-2xl shadow-lg shadow-blue-900/20 transition-all btn-active mt-2 uppercase tracking-tight">
            Salvar Movimentação
        </button>
    </div>

    <div class="mt-8">
        <div class="flex justify-between items-end mb-4 px-1">
            <h2 class="text-lg font-bold text-gray-300">Histórico (7 dias)</h2>
            <button onclick="limparDados()" class="text-[10px] text-red-500/70 uppercase font-black tracking-tighter border border-red-900/30 px-2 py-1 rounded">Zerar Tudo</button>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="exportarBackup()" class="flex-1 text-[11px] text-blue-400 uppercase font-black tracking-wider border border-blue-900/50 bg-blue-950/20 px-2 py-2.5 rounded-xl btn-active">
                💾 Backup
            </button>
            <button onclick="document.getElementById('importar-backup').click()" class="flex-1 text-[11px] text-green-400 uppercase font-black tracking-wider border border-green-900/50 bg-green-950/20 px-2 py-2.5 rounded-xl btn-active">
                🔄 Restaurar
            </button>
        </div>
        <input type="file" id="importar-backup" accept=".txt" style="display:none">

        <div id="historico-lista" class="space-y-3">
            </div>
    </div>

    <script>
        const MEMORIA_CHAVE = 'dados_financeiro_blindado_v3';

        let dados = JSON.parse(localStorage.getItem(MEMORIA_CHAVE)) || {
            saldoAcumulado: 0,
            historico: []
        };

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function atualizarUI() {
            const saldoEl = document.getElementById('saldo-total');
            saldoEl.innerText = formatarMoeda(dados.saldoAcumulado);
            saldoEl.className = `text-5xl font-bold transition-colors duration-500 ${dados.saldoAcumulado >= 0 ? 'text-green-500' : 'text-red-500'}`;

            const resumoContainer = document.getElementById('ultimo-resumo-container');
            if (dados.historico.length > 0) {
                const ultimo = dados.historico[dados.historico.length - 1];
                resumoContainer.classList.remove('hidden');
                document.getElementById('last-ganho').innerText = formatarMoeda(ultimo.faturamento);
                document.getElementById('last-gastos').innerText = formatarMoeda(ultimo.gasolina + ultimo.pessoal + ultimo.manutencao);
                document.getElementById('last-reserva').innerText = formatarMoeda(ultimo.reserva);
            } else {
                resumoContainer.classList.add('hidden');
            }

            const listaContainer = document.getElementById('historico-lista');
            listaContainer.innerHTML = '';

            const ultimos7 = [...dados.historico].slice(-7).reverse();

            if (ultimos7.length === 0) {
                listaContainer.innerHTML = '<p class="p-8 text-center text-gray-600 text-sm italic bg-gray-900/30 rounded-2xl border border-gray-800">Nenhum lançamento ainda</p>';
                return;
            }

            ultimos7.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-gray-900 p-4 rounded-2xl border border-gray-800 flex items-center justify-between shadow-md';
                
                card.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="bg-gray-800 px-2.5 py-1.5 rounded-xl text-center">
                            <span class="block text-[10px] text-gray-500 uppercase font-bold tracking-tight">Data</span>
                            <span class="text-xs text-gray-300 font-bold">${item.data}</span>
                        </div>
                        <div>
                            <span class="block text-[9px] text-gray-500 uppercase font-black tracking-wider">Saldo Dia</span>
                            <span class="text-sm font-black ${item.saldoDia >= 0 ? 'text-green-400' : 'text-red-400'}">${formatarMoeda(item.saldoDia)}</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <div class="text-right">
                            <span class="block text-[9px] text-gray-500 uppercase font-black tracking-wider">Reserva</span>
                            <span class="text-xs text-orange-400 font-bold block bg-orange-950/20 px-2 py-0.5 rounded border border-orange-900/30">-${formatarMoeda(item.reserva)}</span>
                        </div>
                        <div class="flex items-center bg-gray-800/80 rounded-xl p-1.5 border border-gray-700/40 space-x-2">
                            <button onclick="editarLancamento(${item.timestamp})" class="p-1 px-2 text-base active:scale-70 transition-transform" title="Editar">✏️</button>
                            <div class="w-[1px] h-4 bg-gray-700"></div>
                            <button onclick="excluirLancamento(${item.timestamp})" class="p-1 px-2 text-base active:scale-70 transition-transform" title="Excluir">🗑️</button>
                        </div>
                    </div>
                `;
                listaContainer.appendChild(card);
            });
        }

        function salvarLancamento(event) {
            const faturamento = parseFloat(document.getElementById('faturamento').value) || 0;
            const gasolina = parseFloat(document.getElementById('gasolina').value) || 0;
            const pessoal = parseFloat(document.getElementById('pessoal').value) || 0;
            const manutencao = parseFloat(document.getElementById('manutencao').value) || 0;
            const reserva = parseFloat(document.getElementById('reserva').value) || 0;

            if (faturamento === 0 && gasolina === 0 && pessoal === 0 && reserva === 0) {
                alert('Por favor, insira os valores do dia.');
                return;
            }

            const saldoDia = faturamento - gasolina - pessoal - manutencao;
            dados.saldoAcumulado += (saldoDia - reserva);

            const novoLancamento = {
                data: new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }),
                faturamento,
                gasolina,
                pessoal,
                manutencao,
                saldoDia,
                reserva,
                timestamp: new Date().getTime()
            };

            dados.historico.push(novoLancamento);
            localStorage.setItem(MEMORIA_CHAVE, JSON.stringify(dados));

            document.getElementById('faturamento').value = '';
            document.getElementById('gasolina').value = '';
            document.getElementById('pessoal').value = '';
            document.getElementById('reserva').value = '';

            atualizarUI();

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '✓ SALVO COM SUCESSO';
            btn.classList.replace('bg-blue-600', 'bg-green-600');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-600', 'bg-blue-600');
            }, 2000);
        }

        function editarLancamento(timestamp) {
            const index = dados.historico.findIndex(item => item.timestamp === timestamp);
            if (index === -1) return;

            const item = dados.historico[index];
            dados.saldoAcumulado -= (item.saldoDia - item.reserva);

            document.getElementById('faturamento').value = item.faturamento;
            document.getElementById('gasolina').value = item.gasolina;
            document.getElementById('pessoal').value = item.pessoal;
            document.getElementById('manutencao').value = item.manutencao;
            document.getElementById('reserva').value = item.reserva;

            dados.historico.splice(index, 1);
            localStorage.setItem(MEMORIA_CHAVE, JSON.stringify(dados));
            atualizarUI();

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function excluirLancamento(timestamp) {
            if (!confirm('Deseja excluir este lançamento?')) return;

            const index = dados.historico.findIndex(item => item.timestamp === timestamp);
            if (index === -1) return;

            const item = dados.historico[index];
            dados.saldoAcumulado -= (item.saldoDia - item.reserva);

            dados.historico.splice(index, 1);
            localStorage.setItem(MEMORIA_CHAVE, JSON.stringify(dados));
            atualizarUI();
        }

        function limparDados() {
            if (confirm('ATENÇÃO: Isso vai apagar todo o seu histórico e zerar o saldo. Confirmar?')) {
                dados = { saldoAcumulado: 0, historico: [] };
                localStorage.setItem(MEMORIA_CHAVE, JSON.stringify(dados));
                atualizarUI();
            }
        }

        function exportarBackup() {
            try {
                const jsonStr = JSON.stringify(dados);
                const base64Data = btoa(unescape(encodeURIComponent(jsonStr)));
                const blob = new Blob([base64Data], { type: 'text/plain;charset=utf-8' });
                const hoje = new Date().toISOString().split('T')[0];
                const nomeArquivo = `backup_financeiro_${hoje}.txt`;

                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = nomeArquivo;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (erro) {
                console.error(erro);
                alert('Erro ao gerar backup');
            }
        }

        const inputImportar = document.getElementById('importar-backup');
        inputImportar.addEventListener('change', (evento
