<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Financeiro Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIkNvbnRyb2xlIEZpbmFuY2Vpcm8gUHJvIiwKICAic2hvcnRfbmFtZSI6ICJGaW5hbmNlcyIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMTExMTExIiwKICAidGhlbWV_Y29sb3IiOiAiIzExMTExMSIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzI0ODkvMjQ4OTcxNS5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">
    <meta name="theme-color" content="#111111">
    <style>
        body {
            background-color: #111111;
            color: #e5e7eb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .btn-active:active {
            transform: scale(0.98);
        }
        .card-glass {
            background: rgba(31, 41, 55, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(75, 85, 99, 0.3);
        }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-20">

    <header class="text-center mb-6 pt-4">
        <h1 class="text-gray-400 text-xs uppercase tracking-widest mb-1">Saldo Acumulado Total</h1>
        <div id="saldo-total" class="text-5xl font-bold text-green-500">R$ 0,00</div>
    </header>

    <div id="ultimo-resumo-container" class="hidden mb-6 animate-fade-in">
        <div class="card-glass rounded-2xl p-4 border border-blue-900/30">
            <h3 class="text-blue-400 text-[10px] uppercase font-bold mb-2 tracking-wider">Último Lançamento Detalhado</h3>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-gray-800/50 p-2 rounded-lg">
                    <span class="block text-[9px] text-gray-500 uppercase">Ganho</span>
                    <span id="last-ganho" class="text-sm font-bold text-green-400">R$ 0</span>
                </div>
                <div class="bg-gray-800/50 p-2 rounded-lg">
                    <span class="block text-[9px] text-gray-500 uppercase">Gastos</span>
                    <span id="last-gastos" class="text-sm font-bold text-red-400">R$ 0</span>
                </div>
                <div class="bg-gray-800/50 p-2 rounded-lg">
                    <span class="block text-[9px] text-gray-500 uppercase">Reserva</span>
                    <span id="last-reserva" class="text-sm font-bold text-orange-400">R$ 0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="space-y-4 bg-gray-900 p-6 rounded-3xl shadow-2xl border border-gray-800">
        <div>
            <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">FATURAMENTO DO DIA (R$)</label>
            <input type="number" id="faturamento" inputmode="decimal" placeholder="0,00" class="w-full bg-gray-800 text-white text-3xl p-5 rounded-2xl border border-gray-700 focus:ring-4 focus:ring-blue-500/20 transition-all">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1 ml-1 uppercase">Gasolina</label>
                <input type="number" id="gasolina" inputmode="decimal" placeholder="0,00" class="w-full bg-gray-800 text-white text-xl p-4 rounded-2xl border border-gray-700">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1 ml-1 uppercase">Pessoal</label>
                <input type="number" id="pessoal" inputmode="decimal" placeholder="0,00" class="w-full bg-gray-800 text-white text-xl p-4 rounded-2xl border border-gray-700">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1 ml-1 uppercase">Manutenção</label>
                <input type="number" id="manutencao" inputmode="decimal" value="15.00" class="w-full bg-gray-800 text-white text-xl p-4 rounded-2xl border border-gray-700">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1 ml-1 uppercase">Reserva Casa</label>
                <input type="number" id="reserva" inputmode="decimal" placeholder="0,00" class="w-full bg-gray-800 text-white text-xl p-4 rounded-2xl border border-gray-700">
            </div>
        </div>

        <button onclick="salvarLancamento(event)" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-2xl text-2xl shadow-lg shadow-blue-900/20 transition-all btn-active mt-2 uppercase tracking-tight">
            Salvar Movimentação
        </button>
    </div>

    <div class="mt-8">
        <div class="flex justify-between items-end mb-4 px-1">
            <div>
                <h2 class="text-lg font-bold text-gray-300">Histórico (7 dias)</h2>
                <p class="text-[10px] text-gray-500 italic">Toque em uma linha para abrir opções</p>
            </div>
            <button onclick="limparDados()" class="text-[10px] text-red-500/70 uppercase font-black tracking-tighter border border-red-900/30 px-2 py-1 rounded">Zerar Tudo</button>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="exportarBackup()" class="flex-1 text-[11px] text-blue-400 uppercase font-black tracking-wider border border-blue-900/50 bg-blue-950/20 px-2 py-2.5 rounded-xl btn-active">
                💾 Backup
            </button>
            <button onclick="document.getElementById('importar-backup').click()" class="flex-1 text-[11px] text-green-400 uppercase font-black tracking-wider border border-green-900/50 bg-green-950/20 px-2 py-2.5 rounded-xl btn-active">
                🔄 Restaurar
            </button>
        </div>
        <input type="file" id="importar-backup" accept=".txt" style="display:none">

        <div class="overflow-hidden rounded-2xl border border-gray-800 shadow-lg">
            <table class="w-full text-left border-collapse bg-gray-900/50 table-fixed">
                <thead>
                    <tr class="bg-gray-800/80 text-gray-500 text-[10px] uppercase font-black">
                        <th class="p-4 w-[25%]">Data</th>
                        <th class="p-4 w-[40%]">Saldo Dia</th>
                        <th class="p-4 w-[35%] text-right">Reserva</th>
                    </tr>
                </thead>
                <tbody id="historico-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modal-acoes" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 w-full max-w-sm rounded-3xl p-6 space-y-6 shadow-2xl">
            <div class="text-center">
                <span id="modal-data" class="bg-gray-800 text-gray-400 text-xs font-bold px-3 py-1 rounded-full uppercase">Dia 00/00</span>
                <h4 class="text-gray-400 text-xs uppercase tracking-wider mt-4">Faturamento Selecionado</h4>
                <div id="modal-faturamento-valor" class="text-3xl font-black text-white mt-1">R$ 0,00</div>
            </div>

            <div class="space-y-3">
                <button onclick="executarAcaoModal('editar')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl text-lg transition-all btn-active flex items-center justify-center gap-2">
                    ✏️ Editar Valores
                </button>
                <button onclick="executarAcaoModal('excluir')" class="w-full bg-red-950/40 hover:bg-red-900/40 border border-red-900/60 text-red-400 font-bold py-4 rounded-xl text-lg transition-all btn-active flex items-center justify-center gap-2">
                    🗑️ Excluir Movimentação
                </button>
            </div>

            <button onclick="fecharModal()" class="w-full bg-gray-800 text-gray-400 font-medium py-3 rounded-xl text-sm btn-active uppercase tracking-wider">
                Voltar
            </button>
        </div>
    </div>

    <script>
        const CHAVE_LOCAL = 'financeiro_pro';
        let dados = JSON.parse(localStorage.getItem(CHAVE_LOCAL)) || {
            saldoAcumulado: 0,
            historico: []
        };

        let timestampSelecionado = null;

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function atualizarUI() {
            const saldoEl = document.getElementById('saldo-total');
            saldoEl.innerText = formatarMoeda(dados.saldoAcumulado);
            saldoEl.className = `text-5xl font-bold transition-colors duration-500 ${dados.saldoAcumulado >= 0 ? 'text-green-500' : 'text-red-500'}`;

            const resumoContainer = document.getElementById('ultimo-resumo-container');
            if (dados.historico.length > 0) {
                const ultimo = dados.historico[dados.historico.length - 1];
                resumoContainer.classList.remove('hidden');
                document.getElementById('last-ganho').innerText = formatarMoeda(ultimo.faturamento);
                document.getElementById('last-gastos').innerText = formatarMoeda(ultimo.gasolina + ultimo.pessoal + ultimo.manutencao);
                document.getElementById('last-reserva').innerText = formatarMoeda(ultimo.reserva);
            } else {
                resumoContainer.classList.add('hidden');
            }

            const tbody = document.getElementById('historico-body');
            tbody.innerHTML = '';

            const ultimos7 = [...dados.historico].slice(-7).reverse();

            if (ultimos7.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-600 text-sm italic">Nenhum lançamento ainda</td></tr>';
                return;
            }

            ultimos7.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'border-t border-gray-800/50 text-sm hover:bg-gray-800/30 active:bg-gray-800/50 cursor-pointer transition-colors';
                tr.setAttribute('onclick', `abrirModal(${item.timestamp})`);
                
                tbody.appendChild(tr);
                tr.innerHTML = `
                    <td class="p-4 text-gray-400 font-medium">${item.data}</td>
                    <td class="p-4 font-bold ${item.saldoDia >= 0 ? 'text-green-400' : 'text-red-400'}">${formatarMoeda(item.saldoDia)}</td>
                    <td class="p-4 text-right text-orange-400 font-medium">${formatarMoeda(item.reserva)}</td>
                `;
            });
        }

        function abrirModal(timestamp) {
            const item = dados.historico.find(x => x.timestamp === timestamp);
            if (!item) return;

            timestampSelecionado = timestamp;
            document.getElementById('modal-data').innerText = `Dia ${item.data}`;
